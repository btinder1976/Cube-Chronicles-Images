#:schema node_modules/wrangler/config-schema.json
# Cloudflare configuration for CubeChronicles.com
#
# This file is safe to commit and intentionally contains no account-specific
# resource IDs or secrets. Configure the D1 binding and secrets in the
# Cloudflare dashboard for the Pages project, or add real IDs locally before
# using Wrangler for direct deployment.

name = "cubechronicles"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# REQUIRED RUNTIME BINDING
# ------------------------
# Create a D1 database named "cubechronicles" and bind it to this Pages project
# using the variable name DB. The application uses DB for users, sessions,
# questions, responses, subscriptions, moderation, and notification records.
#
# Dashboard path:
# Workers & Pages -> cubechronicles -> Settings -> Bindings -> Add -> D1 database
# Variable name: DB
# Database: cubechronicles
#
# After you have a real database ID, you may alternatively uncomment and fill
# this block for Wrangler-managed deployments:
#
# [[d1_databases]]
# binding = "DB"
# database_name = "cubechronicles"
# database_id = "YOUR_REAL_D1_DATABASE_ID"
# migrations_dir = "migrations"

# OPTIONAL LATER BINDINGS
# -----------------------
# RATE_LIMIT (KV) and EXPORTS (R2) are optional enhancements. They are omitted
# from the first deployment so fake placeholder IDs cannot block the build.

[vars]
# Use the temporary *.pages.dev URL for the first test deployment, then change
# this to https://cubechronicles.com after the custom domain is connected.
SITE_URL = "https://cubechronicles.pages.dev"
EMAIL_FROM_ADDRESS = "no-reply@cubechronicles.com"
EMAIL_FROM_NAME = "The Cube Chronicles"
# Log mode lets registration and notification flows run during initial testing
# without requiring a transactional email provider API key.
EMAIL_PROVIDER = "log"
ADMIN_EMAIL = "owner@cubechronicles.com"

# Add these later in the Cloudflare dashboard when enabling production forms:
# PUBLIC_TURNSTILE_SITE_KEY = "YOUR_REAL_TURNSTILE_SITE_KEY"
# Secret: TURNSTILE_SECRET_KEY
# Secret: EMAIL_PROVIDER_API_KEY (when EMAIL_PROVIDER is changed to "resend")
# Secret: ADMIN_BOOTSTRAP_TOKEN
# Secret: SESSION_SECRET
